name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Instalar dependencias
        run: pip install PyQt6 matplotlib pandas openpyxl Pillow pyinstaller --upgrade

      - name: Generar ícono
        run: python assets/crear_icono.py
        continue-on-error: true

      - name: Inicializar base de datos
        run: python -c "from db.database import init_db; init_db()"
        continue-on-error: true

      - name: Compilar EXE con PyInstaller
        run: pyinstaller vinoteca.spec --noconfirm --clean

      - name: Comprimir EXE en ZIP
        shell: pwsh
        run: Compress-Archive -Path dist/Vinoteca/* -DestinationPath Vinoteca-Windows.zip

      - name: Crear release y subir ZIP
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: Vinoteca-Windows.zip
